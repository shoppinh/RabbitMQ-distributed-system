global:
  scrape_interval: 10s
  evaluation_interval: 10s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']

  # Temporary scrape job for alert testing. Point this at a local metrics server
  # (e.g. host.docker.internal:9100 on Docker Desktop for macOS). Remove when done.
  - job_name: 'alerts-test'
    metrics_path: /metrics
    scrape_interval: 5s
    static_configs:
      - targets: ['host.docker.internal:9100']
